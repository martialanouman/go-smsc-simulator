# healthy.yml — the nominal/reference carrier: 100% success, low fixed latency.
#
# The healthy profile exposes only `latency`; it takes no params knobs.

observability:
  http_port: 9000

virtual_smscs:
  - name: carrier-healthy
    port: 2775
    bind_credentials:
      system_id: smppclient1
      password: secret
    addr_ton: 1
    addr_npi: 1
    address_range: "^33.*"
    tls:
      enabled: false
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: healthy
      latency:
        distribution: fixed
        params: { ms: 20 }
