# slow-carrier.yml — bounded high latency (2–4 s), no errors.
#
# Exercises the gateway's response_timeout_ms / window_size handling. The uniform
# bounds must sit inside the profile's 2000–4000 ms window (spec §6.1).

observability:
  http_port: 9000

virtual_smscs:
  - name: carrier-slow
    port: 2775
    bind_credentials:
      system_id: smppclient1
      password: secret
    addr_ton: 1
    addr_npi: 1
    address_range: "^33.*"
    tls:
      enabled: false
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: slow-carrier
      latency:
        distribution: uniform
        params: { min_ms: 2000, max_ms: 4000 }
