# dead-carrier.yml — refuses binds outright, then recovers via a scheduled
# transition back to healthy at tick 400.
#
# Reproduces the "open then close the circuit breaker" pattern (spec §6.1): the
# active profile advances ONLY through scheduled_transitions, never at runtime.

observability:
  http_port: 9000

virtual_smscs:
  - name: carrier-dead
    port: 2775
    bind_credentials:
      system_id: smppclient1
      password: secret
    addr_ton: 1
    addr_npi: 1
    address_range: "^33.*"
    tls:
      enabled: false
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: dead-carrier
      params:
        mode: reject_bind
      latency:
        distribution: fixed
        params: { ms: 0 }
    scheduled_transitions:
      - at_tick: 400
        to_profile: healthy
