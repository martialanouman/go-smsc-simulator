# tls-carrier.yml — a healthy carrier with TLS enabled on its SMPP listener.
#
# tls.enabled with no cert_file/key_file makes the simulator generate an in-memory
# self-signed cert at boot (SANs: localhost, 127.0.0.1, ::1). To use your own cert,
# add `cert_file:` and `key_file:` (both together) pointing at PEM files.

observability:
  http_port: 9000

virtual_smscs:
  - name: carrier-tls
    port: 2775
    bind_credentials:
      system_id: smppclient1
      password: secret
    addr_ton: 1
    addr_npi: 1
    address_range: "^33.*"
    tls:
      enabled: true
      # cert_file: certs/smsc.pem   # optional; omit both for an auto-generated self-signed cert
      # key_file: certs/smsc.key
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: healthy
      latency:
        distribution: fixed
        params: { ms: 20 }
