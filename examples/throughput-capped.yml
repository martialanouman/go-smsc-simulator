# throughput-capped.yml — enforces its own cap and throttles beyond it, plus a
# scheduled MO probe and a scheduled disconnect.
#
# Exercises the end-to-end adaptive throttling loop, and shows the three
# declarative scheduled-event forms on a valid path (spec §3.1).

observability:
  http_port: 9000

virtual_smscs:
  - name: carrier-capped
    port: 2775
    bind_credentials:
      system_id: smppclient1
      password: secret
    addr_ton: 1
    addr_npi: 1
    address_range: "^33.*"
    tls:
      enabled: false
    seed: 42
    pdu_buffer_size: 20000
    scenario:
      profile: throughput-capped
      params:
        throughput_cap_per_sec: 8000
      latency:
        distribution: spike
        params: { base_ms: 30, spike_ms: 250, interval_ticks: 1000 }
    mo_injection:
      mode: scheduled
      clock: logical
      events:
        - at_tick: 100
          source_addr: "33600000001"
          dest_addr: "33700000002"
          content: "MO probe A"
    scheduled_disconnects:
      - at_tick: 300
        scope: all
        when: before_response
