# Invalid: seed is set but dlr.clock is wallclock (chaos-only) → ErrSeededWallclock.
virtual_smscs:
  - name: carrier-a
    port: 2775
    bind_credentials: { system_id: smppclient1, password: secret }
    addr_ton: 1
    addr_npi: 1
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: healthy
      latency:
        distribution: fixed
        params: { ms: 20 }
      dlr:
        delay: { distribution: fixed, ticks: 5 }
        outcome_weights: { delivered: 100 }
        clock: wallclock
