# Invalid: scheduled_transitions targets a profile not in the catalogue
# → ErrUnknownToProfile.
virtual_smscs:
  - name: carrier-a
    port: 2775
    bind_credentials: { system_id: smppclient1, password: secret }
    addr_ton: 1
    addr_npi: 1
    seed: 42
    pdu_buffer_size: 10000
    scenario:
      profile: healthy
      latency:
        distribution: fixed
        params: { ms: 20 }
    scheduled_transitions:
      - at_tick: 200
        to_profile: ghost-carrier
