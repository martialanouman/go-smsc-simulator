# Grafana dashboard as a ConfigMap for in-cluster Grafana. The `grafana_dashboard: "1"`
# label lets the Grafana sidecar (kube-prometheus-stack / grafana Helm chart) auto-discover
# and load it — no manual import. Assumes Grafana already runs in the cluster and scrapes
# the simulator (the Service carries prometheus.io/scrape annotations; see service.yaml, or
# use a ServiceMonitor if you run the Prometheus Operator).
#
# The embedded JSON is a generated copy of monitoring/grafana/dashboards/smsc-simulator.json
# (the source of truth). Regenerate after editing the dashboard with:
#   kubectl create configmap smsc-simulator-grafana-dashboard \
#     --from-file=smsc-simulator.json=monitoring/grafana/dashboards/smsc-simulator.json \
#     --dry-run=client -o yaml
# then re-apply this file's metadata (labels below).
apiVersion: v1
kind: ConfigMap
metadata:
  name: smsc-simulator-grafana-dashboard
  labels:
    app: smsc-simulator
    grafana_dashboard: "1"
data:
  smsc-simulator.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Activité en temps réel des SMSC virtuels du simulateur : débit submit_sm, résultats servis, latence, binds et profil de scénario actif.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": true,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Nombre total de submit_sm acceptés depuis le démarrage, pour les SMSC sélectionnés.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum(smsc_submit_sm_received_total{virtual_smsc=~\"$virtual_smsc\"})",
              "legendFormat": "reçus",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total submit_sm reçus",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Part des résultats non-success (error, timeout, disconnect) sur 5 min. Renseigne uniquement quand du trafic circule.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 25 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "100 * (sum(rate(smsc_submit_sm_outcome_total{virtual_smsc=~\"$virtual_smsc\", outcome!=\"success\"}[5m])) or vector(0)) / clamp_min(sum(rate(smsc_submit_sm_outcome_total{virtual_smsc=~\"$virtual_smsc\"}[5m])), 1e-9)",
              "legendFormat": "taux d'erreur",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Taux d'erreur (5 min)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Débit instantané agrégé de submit_sm acceptés (toutes cibles sélectionnées).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "purple", "value": null }]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum(rate(smsc_submit_sm_received_total{virtual_smsc=~\"$virtual_smsc\"}[1m]))",
              "legendFormat": "submit_sm/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Débit total (submit_sm/s)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Débit de submit_sm acceptés par SMSC virtuel (taux sur 1 min).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by (virtual_smsc) (rate(smsc_submit_sm_received_total{virtual_smsc=~\"$virtual_smsc\"}[1m]))",
              "legendFormat": "{{virtual_smsc}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Débit submit_sm par carrier",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Résultats servis par type (taux sur 1 min). success/error/timeout/disconnect sont les seules valeurs possibles du label outcome.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 25,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "unit": "reqps"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "success" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "error" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "timeout" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "disconnect" }, "properties": [{ "id": "color", "value": { "fixedColor": "purple", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by (outcome) (rate(smsc_submit_sm_outcome_total{virtual_smsc=~\"$virtual_smsc\"}[1m]))",
              "legendFormat": "{{outcome}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Résultats servis par type",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Latence servie des submit_sm (quantiles issus de l'histogramme smsc_served_latency_seconds, fenêtre 5 min).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["max", "lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "histogram_quantile(0.50, sum by (le) (rate(smsc_served_latency_seconds_bucket{virtual_smsc=~\"$virtual_smsc\"}[5m])))",
              "legendFormat": "p50",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(smsc_served_latency_seconds_bucket{virtual_smsc=~\"$virtual_smsc\"}[5m])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(smsc_served_latency_seconds_bucket{virtual_smsc=~\"$virtual_smsc\"}[5m])))",
              "legendFormat": "p99",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Latence servie (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Sessions SMPP actuellement liées, par SMSC virtuel et type de bind (transmitter / receiver / transceiver).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "min": 0,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by (virtual_smsc, bind_type) (smsc_active_binds{virtual_smsc=~\"$virtual_smsc\"})",
              "legendFormat": "{{virtual_smsc}} · {{bind_type}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Binds actifs",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Profil de scénario actif dans le temps, par SMSC virtuel. Une bande apparaît sur l'intervalle où le profil est actif (utile pour visualiser une transition planifiée).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 80,
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineWidth": 0,
                "spanNulls": false
              },
              "mappings": [
                { "options": { "1": { "color": "green", "index": 0, "text": "actif" } }, "type": "value" }
              ]
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 20 },
          "id": 8,
          "options": {
            "alignValue": "left",
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "mergeValues": true,
            "rowHeight": 0.9,
            "showValue": "auto",
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "smsc_active_scenario{virtual_smsc=~\"$virtual_smsc\"} == 1",
              "legendFormat": "{{virtual_smsc}} · {{scenario}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Profil de scénario actif",
          "type": "state-timeline"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 39,
      "tags": ["smsc", "smpp", "simulator"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(smsc_submit_sm_received_total, virtual_smsc)",
            "hide": 0,
            "includeAll": true,
            "label": "SMSC virtuel",
            "multi": true,
            "name": "virtual_smsc",
            "options": [],
            "query": { "query": "label_values(smsc_submit_sm_received_total, virtual_smsc)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "SMSC Simulator — activité temps réel",
      "uid": "smsc-simulator",
      "version": 1,
      "weekStart": ""
    }
