# Grafana dashboard provider: auto-loads every JSON under the mounted dashboards path.
# The compose service mounts monitoring/grafana/dashboards to /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: smsc-simulator
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
