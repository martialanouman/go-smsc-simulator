version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - revive # naming / style
    - errcheck
    - ineffassign
    - unused
    - unconvert
    - misspell
    - gocritic
    - gosec # no leaked secrets
    - contextcheck
    - nakedret
    - prealloc
  settings:
    gosec:
      excludes:
        # G404: the simulator's determinism (CLAUDE.md invariant a) is BUILT on a
        # seeded math/rand/v2 per bind — crypto/rand would make replay impossible.
        # The weak-RNG warning is categorically inapplicable to this project.
        - G404
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: receiver-naming
        - name: context-as-argument
        - name: error-strings

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/martialanouman/go-smsc-simulator

issues:
  max-same-issues: 0
