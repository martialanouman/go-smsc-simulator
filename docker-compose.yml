# Example compose wiring the simulator as an SMSC connector for the gateway under test.
# `docker compose up` brings up a turnkey plaintext carrier on 2775 (SMPP) + 9000
# (observability). The gateway (a separate project) points an smsc_connectors[] entry at
# smsc-simulator:2775 and can scrape carrier metrics at smsc-simulator:9000/metrics.
#
# Plaintext on purpose: the auto-generated TLS cert is loopback-only (its SANs are
# localhost / 127.0.0.1 / ::1), so a peer reaching this service by name over TLS would
# fail hostname verification. To serve TLS by service name, mount a cert/key whose SANs
# cover "smsc-simulator" and enable tls in the mounted .yml (see examples/tls-carrier.yml).

services:
  smsc-simulator:
    build:
      context: .
      args:
        VERSION: compose
    image: smsc-simulator:dev
    command: ["--config", "/etc/smsc/config.yml"]
    volumes:
      - ./examples/healthy.yml:/etc/smsc/config.yml:ro
    ports:
      - "2775:2775"
      - "9000:9000"

  # Opt-in monitoring stack. `docker compose up` stays a plain carrier; the two services
  # below only start with `docker compose --profile monitoring up`, giving a live Grafana
  # dashboard (http://localhost:3000) fed by Prometheus scraping smsc-simulator:9000.
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - smsc-simulator

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.4.0
    environment:
      # Test-tool convenience: no login wall, land straight on the dashboard.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
